<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Monitor Toggle</title>
    <link rel="stylesheet" href="../libs/css/uspi.css">
    <script src="../libs/js/constants.js"></script>
    <script src="../libs/js/eventEmitter.js"></script>
    <script src="../libs/js/timers.js"></script>
    <script src="../libs/js/utils.js"></script>
    <script src="../libs/js/ulanziApi.js"></script>
    <style>
      :root { 
        --uspi-label-width: 88px;
      }

      html,
      body {
        overflow-x: hidden;
      }

      .uspi-wrapper {
        padding-top: 2px;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      .uspi-wrapper .uspi-item {
        align-items: center;
        margin: 10px 8px;
        max-width: calc(100% - 16px);
        width: calc(100% - 16px);
      }

      .uspi-wrapper .uspi-item-label {
        flex: 0 0 var(--uspi-label-width);
        width: var(--uspi-label-width);
      }

      .uspi-wrapper .uspi-item-value {
        flex: 1 1 auto;
        max-width: 100%;
        min-width: 0;
        width: auto;
      }

      .monitors-item {
        align-items: flex-start;
      }

      .monitors-item .uspi-item-label {
        padding-top: 6px;
      }

      .section-heading {
        margin: 14px 8px 4px;
      }

      .monitor-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 34px;
        gap: 8px;
        width: 100%;
      }

      .monitor-row select,
      select.uspi-item-value {
        min-width: 0;
      }

      #monitor-selectors {
        display: grid;
        gap: 8px;
      }

      #add-monitor {
        display: none;
      }

      .icon-button {
        height: var(--uspi-height);
        min-width: 34px;
        padding: 0;
        border-radius: var(--uspi-borderradius);
        font-size: 18px;
        line-height: 1;
        width: 34px;
      }

      .stacked-value {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toolbar button {
        flex: 0 1 auto;
        min-width: 88px;
        width: auto;
      }

      .status {
        min-height: 20px;
        color: var(--uspi-unitcolor);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .muted-option {
        color: var(--uspi-unitcolor);
      }

      .color-value {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      input[type="color"].color-picker {
        background: transparent;
        border: 0;
        height: var(--uspi-height);
        min-width: 44px;
        padding: 0;
        width: 44px;
      }

      .color-text {
        font-family: Consolas, "Courier New", monospace;
      }
    </style>
  </head>
  <body>
    <form id="property-inspector" class="uspi-wrapper">
      <div class="uspi-item monitors-item">
        <div class="uspi-item-label" data-localize>Mode</div>
        <select class="uspi-item-value" name="mode">
          <option value="single">Single monitor</option>
          <option value="group">Monitor group</option>
        </select>
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Monitors</div>
        <div class="uspi-item-value stacked-value">
          <div id="monitor-selectors"></div>
          <div class="toolbar">
            <button id="add-monitor" type="button">Add monitor</button>
            <button id="refresh-monitors" type="button">Refresh</button>
          </div>
          <div id="monitor-status" class="status"></div>
          <input type="hidden" name="targetKeys">
        </div>
      </div>

      <div class="uspi-heading section-heading" data-localize>Icon</div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Icons</div>
        <select class="uspi-item-value" name="iconPreset">
          <option value="auto">Auto</option>
          <option value="monitor">Monitor</option>
          <option value="group">Monitor group</option>
        </select>
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Active</div>
        <div class="uspi-item-value color-value">
          <input class="color-picker" type="color" name="activeColor" value="#0f766e">
          <input class="uspi-item-value color-text" name="activeColorText" value="#0f766e" maxlength="7" spellcheck="false">
        </div>
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Inactive</div>
        <div class="uspi-item-value color-value">
          <input class="color-picker" type="color" name="inactiveColor" value="#334155">
          <input class="uspi-item-value color-text" name="inactiveColorText" value="#334155" maxlength="7" spellcheck="false">
        </div>
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Foreground</div>
        <div class="uspi-item-value color-value">
          <input class="color-picker" type="color" name="foregroundColor" value="#ecfeff">
          <input class="uspi-item-value color-text" name="foregroundColorText" value="#ecfeff" maxlength="7" spellcheck="false">
        </div>
      </div>
    </form>

    <script>
      const ACTION_UUID = "com.ulanzi.ulanzistudio.monitortoggle.toggle";
      const FORM_SELECTOR = "#property-inspector";
      const form = document.querySelector(FORM_SELECTOR);
      const modeInput = form.elements.mode;
      const targetKeysInput = form.elements.targetKeys;
      const monitorSelectors = document.getElementById("monitor-selectors");
      const addMonitorButton = document.getElementById("add-monitor");
      const refreshMonitorsButton = document.getElementById("refresh-monitors");
      const monitorStatus = document.getElementById("monitor-status");
      const colorInputs = Array.from(form.querySelectorAll('input[type="color"]'));
      const colorTextInputs = Array.from(form.querySelectorAll(".color-text"));

      let displays = [];
      let selectedKeys = [];
      let loadingDisplays = false;
      let hasAppliedSettings = false;
      let hasRequestedInitialState = false;

      function splitTargetKeys(value) {
        return String(value || "")
          .split(/[\n,]+/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function displayLabel(display) {
        const name = display.friendlyName || `Display ${display.targetId}`;
        const source = display.sourceName || "";
        const primary = display.primary ? "primary" : "";
        return [name, source, primary].filter(Boolean).join(" - ");
      }

      function optionLabelForKey(key) {
        const display = displays.find((item) => item.key === key);
        return display ? displayLabel(display) : key;
      }

      function normalizeSelections(keys) {
        if (modeInput.value === "single") {
          return savedKeys(keys).slice(0, 1);
        }

        const seen = new Set();
        return keys
          .map((key) => String(key || "").trim())
          .filter((key) => {
            if (!key) {
              return true;
            }

            if (seen.has(key)) {
              return false;
            }

            seen.add(key);
            return true;
          });
      }

      function savedKeys(keys) {
        return [...new Set(
          keys
            .map((key) => String(key || "").trim())
            .filter(Boolean)
        )];
      }

      function hasSettings(settings) {
        return Boolean(
          settings &&
          (
            Object.prototype.hasOwnProperty.call(settings, "mode") ||
            Object.prototype.hasOwnProperty.call(settings, "targetKeys") ||
            Object.prototype.hasOwnProperty.call(settings, "iconPreset")
          )
        );
      }

      function hasSelectedTargets() {
        return savedKeys(selectedKeys).length > 0;
      }

      function syncTargetKeys() {
        selectedKeys = normalizeSelections(selectedKeys);
        targetKeysInput.value = savedKeys(selectedKeys).join("\n");
        addMonitorButton.style.display = modeInput.value === "group" ? "inline-block" : "none";
      }

      function setStatus(message) {
        monitorStatus.textContent = message || "";
      }

      function normalizeColor(value, fallback) {
        return /^#[0-9a-fA-F]{6}$/.test(String(value || "")) ? value.toLowerCase() : fallback;
      }

      function syncColorPair(input) {
        const text = form.elements[`${input.name}Text`];
        if (text) {
          text.value = input.value;
        }
      }

      function syncColorText(input) {
        const colorName = input.name.replace(/Text$/, "");
        const color = form.elements[colorName];
        const fallback = color?.value || "#000000";
        const normalized = normalizeColor(input.value, fallback);
        input.value = normalized;
        if (color) {
          color.value = normalized;
        }
      }

      function buildSelect(selectedKey, index) {
        const row = document.createElement("div");
        row.className = "monitor-row";

        const select = document.createElement("select");
        select.className = "uspi-item-value";
        select.dataset.index = String(index);

        const blank = document.createElement("option");
        blank.value = "";
        blank.textContent = displays.length ? "Select monitor" : "No monitors detected";
        select.appendChild(blank);

        for (const display of displays) {
          const option = document.createElement("option");
          option.value = display.key;
          option.textContent = displayLabel(display);
          select.appendChild(option);
        }

        if (selectedKey && !displays.some((display) => display.key === selectedKey)) {
          const option = document.createElement("option");
          option.value = selectedKey;
          option.textContent = `${optionLabelForKey(selectedKey)} - unavailable`;
          select.appendChild(option);
        }

        select.value = selectedKey || "";
        select.addEventListener("change", () => {
          selectedKeys[index] = select.value;
          syncTargetKeys();
          renderTargetSelectors();
          saveSettings();
        });

        row.appendChild(select);

        if (modeInput.value === "group" && selectedKeys.length > 1) {
          const remove = document.createElement("button");
          remove.className = "icon-button";
          remove.type = "button";
          remove.title = "Remove monitor";
          remove.setAttribute("aria-label", "Remove monitor");
          remove.textContent = "x";
          remove.addEventListener("click", () => {
            selectedKeys.splice(index, 1);
            syncTargetKeys();
            renderTargetSelectors();
            saveSettings();
          });
          row.appendChild(remove);
        } else if (modeInput.value === "group") {
          const spacer = document.createElement("span");
          spacer.setAttribute("aria-hidden", "true");
          row.appendChild(spacer);
        }

        return row;
      }

      function renderTargetSelectors() {
        syncTargetKeys();
        monitorSelectors.replaceChildren();

        const rowCount = Math.max(1, selectedKeys.length);
        for (let index = 0; index < rowCount; index += 1) {
          monitorSelectors.appendChild(buildSelect(selectedKeys[index] || "", index));
        }

        if (!loadingDisplays && displays.length) {
          setStatus(`${displays.length} active monitor${displays.length === 1 ? "" : "s"} detected.`);
        }
      }

      function applySettings(settings) {
        if (!hasSettings(settings)) {
          renderTargetSelectors();
          return;
        }

        hasAppliedSettings = true;
        Utils.setFormValue(settings || {}, FORM_SELECTOR);
        for (const input of colorInputs) {
          input.value = normalizeColor(settings?.[input.name], input.value);
          syncColorPair(input);
        }
        selectedKeys = splitTargetKeys(settings?.targetKeys);
        renderTargetSelectors();
      }

      function readSettings() {
        syncTargetKeys();
        const settings = Utils.getFormValue(FORM_SELECTOR);
        for (const key of ["activeColor", "inactiveColor", "foregroundColor"]) {
          settings[key] = normalizeColor(settings[key], form.elements[key]?.value || "#000000");
          delete settings[`${key}Text`];
        }
        return settings;
      }

      function saveSettings() {
        const settings = readSettings();
        $UD.setSettings(settings);
        $UD.sendParamFromPlugin(settings);
      }

      const debouncedSave = Utils.debounce(saveSettings, 150);

      function requestDisplays() {
        loadingDisplays = true;
        setStatus("Loading monitors...");
        $UD.sendToPlugin({ type: "listDisplays" });
      }

      function hydrateInspector() {
        if (hasRequestedInitialState) {
          return;
        }

        hasRequestedInitialState = true;
        renderTargetSelectors();
        $UD.getSettings();
        requestDisplays();
      }

      $UD.onConnected(hydrateInspector);

      $UD.onAdd((message) => {
        applySettings(message?.param || {});
        hydrateInspector();
      });

      $UD.onDidReceiveSettings((message) => {
        applySettings(message?.settings || message?.param || {});
      });

      $UD.onSendToPropertyInspector((message) => {
        const payload = message?.payload || {};
        if (payload.type !== "displayList") {
          return;
        }

        loadingDisplays = false;
        displays = Array.isArray(payload.displays) ? payload.displays : [];

        if (payload.settings && (!hasAppliedSettings || !hasSelectedTargets())) {
          applySettings(payload.settings);
          return;
        }

        renderTargetSelectors();
        if (payload.error) {
          setStatus(payload.error);
        }
      });

      form.addEventListener("input", debouncedSave);
      form.addEventListener("change", saveSettings);

      for (const input of colorInputs) {
        input.addEventListener("input", () => {
          syncColorPair(input);
        });
      }

      for (const input of colorTextInputs) {
        input.addEventListener("change", () => {
          syncColorText(input);
          saveSettings();
        });
      }

      modeInput.addEventListener("change", () => {
        selectedKeys = normalizeSelections(selectedKeys);
        renderTargetSelectors();
        saveSettings();
      });

      addMonitorButton.addEventListener("click", () => {
        selectedKeys.push("");
        renderTargetSelectors();
      });

      refreshMonitorsButton.addEventListener("click", requestDisplays);

      renderTargetSelectors();
      $UD.connect(ACTION_UUID);
    </script>
  </body>
</html>
